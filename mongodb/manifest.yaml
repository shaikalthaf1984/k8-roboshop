apiVersion: apps/v1
kind: Deployment

metadata:
  name: mongodb
  namespace: roboshop
  # these are deployment labels
  labels:
    project: roboshop
    component: mongodb
    tier: db

spec:
  replicas: 1

  # these labels are used to select pods
  selector:
    matchLabels:
      project: roboshop
      component: mongodb
      tier: db

  # pod definition
  template:
    metadata:
      labels:
        project: roboshop
        component: mongodb
        tier: db

    spec:
      containers:
      - name: mongodb
        image: shaikalthaf1984/mongodb:v1